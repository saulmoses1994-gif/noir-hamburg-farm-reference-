# Noir Hamburg nginx configuration
#
# The critical directive is `try_files $uri $uri/index.html /index.html;` in
# `location /`. Combined with the SSG build step, this makes nginx serve
# the pre-rendered per-route HTML files (e.g. build/services/vip-escort-hamburg/index.html)
# for deep URLs instead of always falling back to the SPA shell (index.html).
#
# Without this, `/services/vip-escort-hamburg` on production nginx would be
# treated as a "file not found" and nginx would serve the homepage-baked
# build/index.html, causing every service page to show homepage content.
#
# Route resolution order for `/services/vip-escort-hamburg`:
#   1. $uri              → /services/vip-escort-hamburg (no such file)   ❌
#   2. $uri/index.html   → /services/vip-escort-hamburg/index.html ✅   ← SSG output served
#   3. /index.html       → SPA shell fallback for genuinely dynamic client routes

server {
    listen 3000 default_server;
    listen [::]:3000 default_server;

    root /app/frontend/build;
    index index.html;

    # Long-lived caching for hashed static assets (bundle JS/CSS carry
    # cache-busting hashes, so a year of caching is safe).
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Direct file matches (favicon, sitemap, robots, etc.).
    location = /favicon.ico     { access_log off; log_not_found off; }
    location = /robots.txt      { access_log off; log_not_found off; }
    location = /sitemap.xml     { add_header Cache-Control "public, max-age=3600"; }
    location = /llms.txt        { add_header Content-Type "text/plain; charset=utf-8"; }

    # Backend API — reverse proxy so admin CMS + SPA can hit /api/* on the
    # same origin as the frontend. Prevents CORS entirely for first-party
    # calls.
    location /api/ {
        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # HTML routes — serve pre-rendered SSG file for the URL if it exists,
    # otherwise fall back to the SPA shell. HTML responses are never cached
    # so admin CMS edits show up after a `yarn build` + deploy without
    # visitors seeing stale content.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header X-App-Build "2026-02-09-nginx-tryfiles";

        # The key directive: prefer route-specific pre-rendered HTML.
        try_files $uri $uri/index.html /index.html;
    }
}
